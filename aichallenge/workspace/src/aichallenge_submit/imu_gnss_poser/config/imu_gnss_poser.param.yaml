/**:
  ros__parameters:
    # GNSS measurement covariance (adjust_covariance: maps GNSS accuracy to EKF input)
    gnss_covariance:
      good_threshold: 1.0
      good_value: 0.01
      moderate_threshold: 2.0
      moderate_value: 0.04
      poor_value: 0.04
      roll: 100000.0
      pitch: 100000.0
      yaw: 100000.0

    # Initial pose covariance (for /set_initial_pose and first initial_pose3d)
    initial_pose_covariance:
      x: 0.04
      y: 0.04
      yaw: 0.5
