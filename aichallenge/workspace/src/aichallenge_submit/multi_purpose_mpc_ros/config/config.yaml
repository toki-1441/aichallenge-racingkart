common:
  save_config: false

sim_logger:
  animation_enabled: false

map:
  # path from pkg share dir
  yaml_path: "env/final_ver3/occupancy_grid_map.yaml"

waypoints:
  # path from pkg share dir
  # csv_path: "maps/occupancy_grid_map_waypoints.csv"
  csv_path: ""

obstacles:
  # path from pkg share dir
  csv_path: "" # If empty, the obstacles information will be subscribed from the topic
  # csv_path: "maps/occupancy_grid_map_obstacles.csv"
  radius: 1.25

avoidance:
  enabled: true
  wall_margin_m: 0.4
  blend_length_m: 4.0
  slow_distance_m: 3.0
  stop_distance_m: 1.0
  slow_speed_kmh: 10.0
  sections:
    - section_id: 2
      start_s_m: 7.9923651
      end_s_m: 18.9818671
      line: right_wall
    - section_id: 3
      start_s_m: 19.9809128
      end_s_m: 29.9713692
      line: right_wall
    - section_id: 4
      start_s_m: 30.9704148
      end_s_m: 36.9646886
      line: right_wall
    - section_id: 5
      start_s_m: 37.9637343
      end_s_m: 60.9417840
      line: right_wall
    - section_id: 7
      start_s_m: 85.9179249
      end_s_m: 106.8978834
      line: left_wall

avoidance_planner:
  enabled: true
  candidate_wall_margin_m: 0.1
  prediction_horizon_s: 3.0
  prediction_dt_s: 0.2
  ego_radius_m: 0.75
  obstacle_radius_m: 0.85
  collision_margin_m: 0.5
  min_hold_time_s: 1.5
  switch_cooldown_s: 1.0
  switch_margin_m: 0.5
  obstacle_timeout_s: 1.0
  obstacle_v_max_mps: 30.0
  obstacle_jump_threshold_m: 8.0
  emergency_override: true
  default_line: center

reference_path:
  update_by_topic: false # When true, 'circle' must be false
  # path from pkg share dir
  # csv_path: ""
  csv_path: "env/final_ver3/traj_mincurv.csv"
  resolution: 0.6
  smoothing_distance: 2
  max_width: 6.0
  circular: true
  use_path_constraints_topic: false
  use_border_cells_topic: false
  # use_path_constraints_topic: true
  # use_border_cells_topic: true

bicycle_model:
  length: 1.087
  # width: 1.45   # real machine width
  width: 2.30   # +safety margin

mpc:
  N: 20
  # Q: [e_y, e_psi, t]
  # R: [v, delta]
  # QN: [e_y, e_psi, t]
  R: [100000.0, 0.0]
  a_min: -1.6 # m/s^2
  a_max: 0.7 # m/s^2
  delta_max_deg: 32.0 # degrees
  steer_rate_max: 0.35 # rad/s
  control_rate: 40.0 # Hz
  steering_tire_angle_gain_var: 1.639
  # steering_tire_angle_gain_var: 1.0
  # accel_low_pass_gain: 0.1
  # steer_low_pass_gain: 0.3
  accel_low_pass_gain: 1.0
  steer_low_pass_gain: 1.0
  wp_id_offset: 2
  use_max_kappa_pred: true


  ## ---------- 究極 ------------- ##
  ## Lap1: 53s, Lap2: 47s

  # v_max: 30.0   # km/h
  # ay_max: 12.0  # m/s^2, maximum lateral acceleration in curves
  # Q: [600000.0, 100000000.0, 2000000.0]
  # QN: [1000000.0, 1000000.0, 10000.0]

  ## --- 高速 (gnss delay 0.3) --- ##
  ## Lap1: 55s, Lap2: 49s

  # v_max: 30.0
  # ay_max: 9.5
  # Q: [1000000.0, 100000000.0, 850000.0]
  # QN: [1000000.0, 1000.0, 10000.0]

  ## --- 高速 (gnss delay 0.4) --- ##
  ## Lap1: 55s, Lap2: 49s

  # v_max: 30.0
  # ay_max: 9.5
  # Q: [1000000.0, 100000000.0, 1850000.0]
  # QN: [1000000.0, 1000.0, 10000.0]

  ## --- 中高速 --- ##
  ## Lap1: 59s, Lap2: 54s
  # v_max: 25.0
  # ay_max: 7.0
  # Q: [1000000.0, 100000000.0, 850000.0]
  # QN: [1000000.0, 1000.0, 10000.0]

  ## --------- 中速 -------------- ##
  ## Lap1: 67s, Lap2: 64s

  v_max: 28.0
  ay_max: 6.5
  Q: [3000000.0, 90000000.0, 100000.0] # 低速だとインを攻めがちなので、あえて外に膨らむパラメータ
  QN: [1000000.0, 1000.0, 10000.0]

  ## -------- 低速 -------------- ##
  ## Lap1: 86s

  # v_max: 15.0
  # ay_max: 5.5
  # Q: [5000000.0, 100000000.0, 200000.0] # 低速だとインを攻めがちなので、あえて外に膨らむパラメータ
  # QN: [1000000.0, 1000.0, 10000.0]

v2x_obstacle_avoidance:
  vehicle_radius: 0.85         # [m]
  v_max_safety: 30.0           # [m/s]
  position_jump_threshold: 8.0 # [m]
